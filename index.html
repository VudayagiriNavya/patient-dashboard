<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Patients</h2>
    <p>Jessica Taylor</p>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- Profile -->
    <section class="profile">
      <h2 id="name">Name</h2>
      <p id="age">Age</p>
    </section>

    <!-- Vitals -->
    <section class="vitals">
      <p>Blood Pressure: <span id="bp"></span></p>
      <p>Heart Rate: <span id="hr"></span></p>
    </section>

    <!-- Chart -->
    <section class="chart">
      <canvas id="bpChart"></canvas>
    </section>

  </main>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Your JS -->
<script src="script.js"></script>

</body>
</html>
